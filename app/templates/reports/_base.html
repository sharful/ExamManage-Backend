<!DOCTYPE html>
<html lang="bn" xml:lang="bn">
<head>
<meta charset="UTF-8">
<title>{{ doc_title }}</title>
<style>
{% if font_file_url %}
@font-face {
    font-family: 'Noto Sans Bengali';
    src: url('{{ font_file_url }}');
    font-weight: normal;
    font-style: normal;
}
{% endif %}

@page {
    size: A4 landscape;
    margin: 1.5cm;
}

:root {
    --color-header-bg: #1a3c5e;
    --color-header-text: #ffffff;
    --color-row-alt: #f0f4f8;
    --color-grid: #aab4be;
}

html, body {
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 9pt;
    color: #000;
    margin: 0;
    padding: 0;
}

.college-header {
    text-align: center;
    font-size: 20pt;
    font-weight: bold;
    margin-bottom: 0.3cm;
}

h1.report-title {
    color: var(--color-header-bg);
    font-size: 16pt;
    margin: 0 0 0.4cm 0;
    font-weight: bold;
}

h2.section-subtitle {
    font-size: 11pt;
    margin: 0.6cm 0 0.2cm 0;
    font-weight: bold;
}

table.report {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
}

table.report thead {
    display: table-header-group;
}

table.report th {
    background-color: var(--color-header-bg);
    color: var(--color-header-text);
    font-weight: bold;
    font-size: 10pt;
    padding: 8px;
    text-align: left;
    border: 0.5pt solid var(--color-grid);
}

table.report td {
    font-size: 9pt;
    padding: 5px 8px;
    border: 0.5pt solid var(--color-grid);
    vertical-align: middle;
    text-align: left;
    word-wrap: break-word;
}

table.report tbody tr:nth-child(even) td {
    background-color: var(--color-row-alt);
}
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
